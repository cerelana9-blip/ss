<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hadiah Amplop Spesial</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#13070d;
overflow-x:hidden;
color:white;
}

.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
position:relative;
overflow:hidden;
}

.bg{
position:absolute;
inset:0;
background:url('YOUR_IMAGE_HERE') center/cover no-repeat;
filter:blur(12px) brightness(.35);
transform:scale(1.15);
}

.overlay{
position:absolute;
inset:0;
background:
linear-gradient(
180deg,
rgba(0,0,0,.15),
rgba(0,0,0,.7)
);
}

.content{
position:relative;
z-index:2;
max-width:700px;
text-align:center;
}

.badge{
display:inline-block;
padding:10px 18px;
border-radius:999px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(10px);
margin-bottom:15px;
font-weight:600;
}

.main-image{
width:min(320px,80vw);
border-radius:24px;
box-shadow:
0 0 50px rgba(255,187,0,.4),
0 0 120px rgba(255,120,0,.2);
}

h1{
font-size:clamp(38px,7vw,70px);
line-height:1.1;
margin-top:25px;
font-weight:900;
}

.gold{
background:linear-gradient(
45deg,
#ffd86f,
#ffb300
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.desc{
font-size:18px;
opacity:.9;
margin-top:15px;
line-height:1.6;
}

.timer{
margin-top:20px;
font-size:22px;
font-weight:700;
color:#ffd86f;
}

.claim-btn{
margin-top:30px;
border:none;
cursor:pointer;
padding:20px 55px;
font-size:24px;
font-weight:800;
color:white;
border-radius:999px;
background:
linear-gradient(
45deg,
#ff4ea1,
#ff7c34
);

box-shadow:
0 0 25px #ff4ea1,
0 0 50px rgba(255,78,161,.5);

animation:
pulse 1s infinite,
shake 2s infinite;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

100%{
transform:scale(1);
}

}

@keyframes shake{

0%,100%{
transform:rotate(0deg);
}

25%{
transform:rotate(-2deg);
}

75%{
transform:rotate(2deg);
}

}

.claim-btn:hover{
transform:scale(1.1);
}

.floating{
position:absolute;
width:10px;
height:10px;
background:gold;
border-radius:50%;
opacity:.5;
animation:float 12s linear infinite;
}

@keyframes float{

from{
transform:translateY(120vh);
}

to{
transform:translateY(-20vh);
}

}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
z-index:9999;
justify-content:center;
align-items:center;
padding:20px;
}

.modal-box{
background:white;
color:#333;
width:100%;
max-width:450px;
padding:35px;
border-radius:25px;
text-align:center;
animation:pop .35s ease;
}

@keyframes pop{

from{
opacity:0;
transform:scale(.8);
}

to{
opacity:1;
transform:scale(1);
}

}

.money{
font-size:65px;
}

.win{
font-size:38px;
font-weight:900;
color:#ff4ea1;
margin-top:10px;
}

.amount{
font-size:45px;
font-weight:900;
margin-top:10px;
color:#ff7c34;
}

.next-btn{

margin-top:25px;
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:20px;
font-weight:700;
cursor:pointer;
color:white;

background:
linear-gradient(
45deg,
#ff4ea1,
#ff7c34
);

}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-20px;
animation:fall 3s linear forwards;
z-index:99999;
}

@keyframes fall{

to{
transform:
translateY(110vh)
rotate(720deg);
}

}

</style>
</head>
<body>

<div class="hero">

<div class="bg"></div>
<div class="overlay"></div>

<div class="content">

<div class="badge">
🎁 Promo Terbatas
</div>

<img
src="YOUR_IMAGE_HERE"
class="main-image"
>

<h1>
Dapatkan
<span class="gold">
Hadiah Amplop
</span>
Hari Ini
</h1>

<p class="desc">
Klik tombol di bawah dan lihat apakah kamu beruntung mendapatkan hadiah spesial.
</p>

<div class="timer" id="timer">
05:00
</div>

<button class="claim-btn" onclick="claimPromo()">
CLAIM PROMO
</button>

</div>

</div>

<div class="modal" id="popup">

<div class="modal-box">

<div class="money">🧧</div>

<div class="win">
SELAMAT!
</div>

<div class="amount">
Rp10.000
</div>

<p style="margin-top:15px;">
Kamu mendapatkan hadiah amplop senilai Rp10.000.
<br><br>
Silakan lanjutkan pendaftaran.
</p>

<button
class="next-btn"
onclick="window.location.href='register.html'"
>
LANJUTKAN PENDAFTARAN
</button>

</div>

</div>

<script>

for(let i=0;i<40;i++){

let el=document.createElement("div");

el.className="floating";

el.style.left=Math.random()*100+"%";
el.style.animationDuration=
(8+Math.random()*8)+"s";

document.body.appendChild(el);

}

function claimPromo(){

document.getElementById("popup")
.style.display="flex";

for(let i=0;i<80;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=
["#ff4ea1","#ffd700","#ff7c34"]
[Math.floor(Math.random()*3)];

document.body.appendChild(c);

setTimeout(()=>c.remove(),3000);

}

}

let total=300;

setInterval(()=>{

let m=Math.floor(total/60);
let s=total%60;

document.getElementById("timer").innerHTML=
String(m).padStart(2,'0')
+":"+
String(s).padStart(2,'0');

if(total>0) total--;

},1000);

</script>

</body>
</html>
